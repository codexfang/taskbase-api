services:
  - type: web
    name: taskbase-api
    env: node
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskbase-db
          property: connectionString
      - key: NODE_VERSION
        value: 20

databases:
  - name: taskbase-db
    region: oregon
    databaseName: taskbase
    user: taskbase
